<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home Page</title>

    <link rel="stylesheet" href="./CSS/homestyle.css">

    <script src="./Java/Menu.js" defer></script>

</head>

<header class="log-in">

    <button class="log-in-button" id="log-in-button">
        Log-in
    </button>

</header>

<body>

    <section class="main-container">


            
        <h1 Class="morabaraba-text">
        
            Morabaraba

        </h1>

        <h2 class="local-play">

            <button class="local-button" id="local-button">Local Play</button>

        </h2>

        <h3 class="online-play">

            <button class="online-button" id="online-button">Online Play</button>

        </h3>

    </section>
    
    <div class="modal" id="modal">

        <div class="modal-inner">

            <button class="closeModal" id="closeModal">back</button>

            <h2>Local Menu</h2>

            
            <button class="Play-with-firend">Play with Friend</button>
           

            <button class="Play-with-AI">Play with AI</button>

        </div>

    </div>


    
    <div class="modal" id="online-menu-modal">

        <div class="modal-inner-1">

            <button class="closeModal" id="closeOnlineMenuModal">back</button>

            <h2>Online Menu</h2>

            
            <button class="create-room-button">Create Room</button>
          

            <button class="join-room-button">Join Room</button>

        </div>

    </div>

    <div class="modal" id="log-in-modal">

        <div class="modal-inner-2">

            <button class="closeModal" id="closeLogInModal">back</button>
            
            <h2>Login</h2>

            <input class="username-input" type="text" placeholder="Username">

            <input class="password-input" type = "text" placeholder="Password">

            <button class="inner-login-button">LOG IN</button>

            <button class="create-account-button" id="sign-up-button">Create New Account</button>

        </div>

    </div>

     <div class="modal" id="sign-up-modal">

        <div class="modal-inner-3">

            <button class="closeModal" id="closeSignUpModal">back</button>
            
            <h2>Sign Up</h2>

            <input class="username-input" type="text" placeholder="Username">

            <input class="email-input" type="text" placeholder="Email">

            <input class="password-input" type = "text" placeholder="Password">

            <button class="inner-signup-button">SIGN UP</button>

        </div>

    </div>
    
</body>

</html>
